<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صالون المغيني</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --text: #f0ead6;
  --text-dim: #8a8070;
  --green: #27ae60;
  --red: #c0392b;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: Cairo, sans-serif; min-height: 100vh; }

header { text-align: center; padding: 36px 20px 24px; border-bottom: 1px solid var(--border); }
header::before { content:''; display:block; width:160px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 auto 20px; }
header h1 { font-size: clamp(22px,5vw,36px); font-weight:900; color:var(--gold); }
header p { color:var(--text-dim); font-size:13px; margin-top:4px; }
.wa-hdr { display:inline-flex; align-items:center; gap:7px; background:#25D366; color:#fff; padding:8px 18px; border-radius:30px; font-size:13px; font-weight:700; text-decoration:none; margin-top:12px; }

nav { display:flex; justify-content:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--border); }
.tab { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); padding:8px 20px; border-radius:30px; cursor:pointer; font-family:Cairo,sans-serif; font-size:14px; font-weight:600; transition:all .2s; }
.tab.on { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }

main { max-width:600px; margin:0 auto; padding:20px 14px 80px; }
.sec { display:none; }
.sec.on { display:block; }

.queue { background:var(--gold-dim); border:1px solid var(--gold); border-radius:var(--r); padding:14px; text-align:center; margin-bottom:20px; }
.queue .n { font-size:38px; font-weight:900; color:var(--gold); }
.queue small { color:var(--text-dim); font-size:12px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:14px; }
.card h3 { font-size:15px; font-weight:700; color:var(--gold); margin-bottom:14px; }
label { display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; }
input[type=text] { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:Cairo,sans-serif; font-size:15px; padding:11px 13px; outline:none; transition:border-color .2s; }
input[type=text]:focus { border-color:var(--gold); }

.svc-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.svc { background:var(--surface2); border:2px solid var(--border); border-radius:10px; padding:13px 10px; cursor:pointer; text-align:center; transition:all .2s; position:relative; }
.svc:hover,.svc.on { border-color:var(--gold); background:var(--gold-dim); }
.svc .ic { font-size:26px; margin-bottom:5px; }
.svc .nm { font-size:13px; font-weight:700; }
.svc .du { font-size:11px; color:var(--text-dim); margin-top:3px; }

.color-picker {
  display:none;
  grid-template-columns: repeat(4, 1fr);
  gap:8px;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--border);
}
.color-picker.show { display:grid; }
.color-option {
  width:100%;
  aspect-ratio:1;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  color:#fff;
  text-shadow:1px 1px 2px rgba(0,0,0,0.5);
}
.color-option:hover { border-color:var(--gold); transform:scale(1.05); }
.color-option.selected { border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.5); }

.barbers { display:flex; gap:9px; flex-wrap:wrap; }
.barber { flex:1; min-width:85px; background:var(--surface2); border:2px solid var(--border); border-radius:10px; padding:13px 8px; cursor:pointer; text-align:center; transition:all .2s; }
.barber:hover,.barber.on { border-color:var(--gold); background:var(--gold-dim); }
.barber .av { font-size:28px; margin-bottom:5px; }
.barber .bn { font-size:12px; font-weight:700; }

.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-title { font-size:15px; font-weight:700; color:var(--gold); }
.cal-nav { background:var(--surface2); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:18px; line-height:1; }
.cal-nav:hover { border-color:var(--gold); color:var(--gold); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:14px; }
.cal-dn { text-align:center; font-size:10px; color:var(--text-dim); font-weight:700; padding:4px 0; }
.cal-d { text-align:center; padding:9px 2px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:all .15s; }
.cal-d:hover:not(.emp):not(.pst) { border-color:var(--gold); color:var(--gold); }
.cal-d.sel { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.cal-d.tdy { border-color:rgba(201,168,76,.4); }
.cal-d.pst { color:var(--text-dim); opacity:.35; cursor:default; }
.cal-d.emp { cursor:default; }

.slots { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
.slot { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 3px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; }
.slot:hover { border-color:var(--gold); color:var(--gold); }
.slot.sel { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.slot.bkd { background:rgba(192,57,43,.1); border-color:rgba(192,57,43,.3); color:var(--text-dim); cursor:not-allowed; text-decoration:line-through; }

.btn-sub { width:100%; padding:15px; border:none; border-radius:var(--r); background:linear-gradient(135deg,var(--gold),var(--gold-light)); color:#111; font-family:Cairo,sans-serif; font-size:16px; font-weight:900; cursor:pointer; margin-top:6px; transition:opacity .2s; }
.btn-sub:hover { opacity:.88; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:20px; z-index:999; }
.overlay.on { display:flex; }
.conf-box { background:var(--surface); border:1px solid var(--gold); border-radius:16px; padding:28px 22px; max-width:360px; width:100%; text-align:center; animation:pop .3s ease; }
@keyframes pop { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
.conf-box .ck { font-size:52px; margin-bottom:10px; }
.conf-box h2 { color:var(--gold); font-size:20px; margin-bottom:6px; }
.conf-details { background:var(--surface2); border-radius:10px; padding:13px; margin:14px 0; text-align:right; }
.conf-details p { font-size:13px; margin-bottom:5px; }
.conf-details span { color:var(--gold); font-weight:700; }
.btn-wa { display:inline-flex; align-items:center; gap:8px; background:#25D366; color:#fff; border:none; padding:12px 22px; border-radius:30px; font-family:Cairo,sans-serif; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none; }
.btn-cls { display:block; width:100%; margin-top:9px; background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:10px; border-radius:8px; font-family:Cairo,sans-serif; font-size:13px; cursor:pointer; }

.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:18px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px; text-align:center; }
.stat .n { font-size:26px; font-weight:900; color:var(--gold); }
.stat small { font-size:11px; color:var(--text-dim); }

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<header>
  <span style="font-size:44px;display:block;margin-bottom:6px">✂️</span>
  <h1>صالون المغيني</h1>
  <p>إدارة أحمد المغيني</p>
  <a href="https://wa.me/201270048471" target="_blank" class="wa-hdr">
    <span>واتساب</span>
  </a>
</header>

<nav>
  <button class="tab on" onclick="showTab('booking',this)">📅 حجز موعد</button>
  <button class="tab" onclick="showTab('admin',this)">🛠️ لوحة التحكم</button>
</nav>

<main>

<!-- BOOKING -->
<div id="sec-booking" class="sec on">

  <div class="queue">
    <div class="n" id="q-num">0</div>
    <div>دور قبلك الآن</div>
  </div>

  <!-- NAME -->
  <div class="card">
    <h3>👤 اسمك</h3>
    <input type="text" id="inp-name" placeholder="اكتب اسمك هنا">
  </div>

  <!-- SERVICE -->
  <div class="card">
    <h3>✂️ اختر الخدمة</h3>
    <div class="svc-grid" id="svc-grid"></div>
  </div>

  <!-- BARBERS -->
  <div class="card">
    <h3>💈 اختر الحلاق</h3>
    <div class="barbers" id="barbers"></div>
  </div>

  <!-- DATE + TIME -->
  <div class="card">
    <h3>📅 اختر اليوم والميعاد</h3>
    <div class="cal-header">
      <button class="cal-nav" onclick="prevMonth()">›</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav" onclick="nextMonth()">‹</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="time-wrap" style="display:none">
      <label style="margin-bottom:10px;color:var(--text-dim);font-size:13px">🕐 اختر الساعة ليوم <b id="date-lbl" style="color:var(--gold)"></b></label>
      <div class="slots" id="slots"></div>
    </div>
  </div>

  <button class="btn-sub" onclick="doBook()">تأكيد الحجز ✅</button>
</div>

</main>

<!-- CONFIRM -->
<div class="overlay" id="overlay">
  <div class="conf-box">
    <div class="ck">🎉</div>
    <h2>تم الحجز بنجاح!</h2>
    <div class="conf-details" id="conf-det"></div>
    <button class="btn-cls" onclick="closeOverlay()">✕ إغلاق</button>
  </div>
</div>

<script>
const WA = '201270048471';

const SERVICES = [
  {id:'s1',  name:'حلاقة شعر',              ic:'✂️',  price:100, dur:'30 دقيقة'},
  {id:'s2',  name:'حلاقة كاملة باستشوار',   ic:'💨',  price:120, dur:'45 دقيقة'},
  {id:'s3',  name:'حلاقة كاملة كيرلي',      ic:'🌀',  price:120, dur:'45 دقيقة'},
  {id:'s4',  name:'هيدروفيشيل',             ic:'💧',  price:100, dur:'60 دقيقة'},
  {id:'s5',  name:'صباغة الشعر',            ic:'🎨',  price:200, dur:'90 دقيقة', hasColors: true},
  {id:'s6',  name:'ليزر تحديد',             ic:'⚡',  price:50,  dur:'30 دقيقة'},
];

const HAIR_COLORS = [
  {name:'أسود', color:'#1a1a1a'},
  {name:'بني', color:'#8B4513'},
  {name:'بني فاتح', color:'#CD853F'},
  {name:'أحمر', color:'#C41E3A'},
  {name:'أحمر نبيتي', color:'#8B0000'},
  {name:'ذهبي', color:'#FFD700'},
  {name:'أشقر', color:'#F0E68C'},
  {name:'بلاتيني', color:'#E8E8E8'},
];

const BARBERS = [
  {id:'b1', name:'يوسف', av:'👨‍🦱'},
  {id:'b2', name:'فاروق', av:'👨‍🦲'},
  {id:'b3', name:'السيد', av:'👨‍🦱'},
];

let currentMonth = new Date();
let selectedDate = null;
let selectedTime = null;
let selectedService = null;
let selectedBarber = null;
let selectedColor = null;

function renderServices() {
  const grid = document.getElementById('svc-grid');
  grid.innerHTML = SERVICES.map(s => `
    <div class="svc" onclick="selectService('${s.id}', this, ${s.hasColors ? 'true' : 'false'})">
      <div class="ic">${s.ic}</div>
      <div class="nm">${s.name}</div>
      <div class="du">${s.dur}</div>
      ${s.hasColors ? `<div class="color-picker" id="colors-${s.id}"></div>` : ''}
    </div>
  `).join('');
}

function selectService(id, el, hasColors) {
  document.querySelectorAll('.svc').forEach(e => {
    e.classList.remove('on');
    const picker = e.querySelector('.color-picker');
    if(picker) picker.classList.remove('show');
  });
  
  el.classList.add('on');
  selectedService = id;
  selectedColor = null;
  
  if(hasColors) {
    const picker = el.querySelector('.color-picker');
    picker.classList.add('show');
    picker.innerHTML = HAIR_COLORS.map(c => `
      <div class="color-option" onclick="selectColor('${c.name}', this)" style="background-color:${c.color}" title="${c.name}">
        ${c.name}
      </div>
    `).join('');
  }
}

function selectColor(name, el) {
  document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = name;
}

function renderBarbers() {
  const div = document.getElementById('barbers');
  div.innerHTML = BARBERS.map(b => `
    <div class="barber" onclick="selectBarber('${b.id}', this)">
      <div class="av">${b.av}</div>
      <div class="bn">${b.name}</div>
    </div>
  `).join('');
}

function selectBarber(id, el) {
  document.querySelectorAll('.barber').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
  selectedBarber = id;
}

function renderCalendar() {
  const title = document.getElementById('cal-title');
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  title.textContent = months[currentMonth.getMonth()] + ' ' + currentMonth.getFullYear();
  
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  
  const dayNames = ['س','ن','ث','ر','خ','ج','ح'];
  dayNames.forEach(d => {
    const dn = document.createElement('div');
    dn.className = 'cal-dn';
    dn.textContent = d;
    grid.appendChild(dn);
  });
  
  const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
  const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - firstDay.getDay());
  
  const today = new Date();
  today.setHours(0,0,0,0);
  
  for(let i = 0; i < 42; i++) {
    const d = document.createElement('div');
    d.className = 'cal-d';
    
    if(startDate.getMonth() !== currentMonth.getMonth()) {
      d.className += ' emp';
    } else {
      const dateStr = startDate.toISOString().split('T')[0];
      if(startDate < today) {
        d.className += ' pst';
      }
      d.textContent = startDate.getDate();
      d.onclick = () => selectDate(startDate, d);
    }
    
    if(startDate.toDateString() === today.toDateString()) {
      d.className += ' tdy';
    }
    
    grid.appendChild(d);
    startDate.setDate(startDate.getDate() + 1);
  }
}

function selectDate(date, el) {
  document.querySelectorAll('.cal-d').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  selectedDate = date;
  
  const options = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
  document.getElementById('date-lbl').textContent = date.toLocaleDateString('ar-EG', options);
  document.getElementById('time-wrap').style.display = 'block';
  renderTimeSlots();
}

function renderTimeSlots() {
  const times = [];
  for(let h = 10; h < 21; h++) {
    for(let m of [0, 30]) {
      times.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }
  
  const slots = document.getElementById('slots');
  slots.innerHTML = times.map(t => `
    <div class="slot" onclick="selectTime('${t}', this)">${t}</div>
  `).join('');
}

function selectTime(time, el) {
  document.querySelectorAll('.slot').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  selectedTime = time;
}

function prevMonth() {
  currentMonth.setMonth(currentMonth.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentMonth.setMonth(currentMonth.getMonth() + 1);
  renderCalendar();
}

function doBook() {
  const name = document.getElementById('inp-name').value;
  
  if(!name || !selectedService || !selectedBarber || !selectedDate || !selectedTime) {
    alert('الرجاء ملء جميع الحقول');
    return;
  }
  
  const service = SERVICES.find(s => s.id === selectedService);
  const barber = BARBERS.find(b => b.id === selectedBarber);
  
  let details = `
    <p>👤 الاسم: <span>${name}</span></p>
    <p>✂️ الخدمة: <span>${service.name}</span></p>
    ${selectedColor ? `<p>🎨 اللون: <span>${selectedColor}</span></p>` : ''}
    <p>💈 الحلاق: <span>${barber.name}</span></p>
    <p>📅 التاريخ: <span>${selectedDate.toLocaleDateString('ar-EG')}</span></p>
    <p>🕐 الوقت: <span>${selectedTime}</span></p>
    <p>💰 السعر: <span>${service.price} ج.م</span></p>
  `;
  
  document.getElementById('conf-det').innerHTML = details;
  document.getElementById('overlay').classList.add('on');
  
  const msg = `حجز جديد:\n${name}\n${service.name}${selectedColor ? ' - '+selectedColor : ''}\nالحلاق: ${barber.name}\n${selectedDate.toLocaleDateString('ar-EG')} - ${selectedTime}`;
  document.getElementById('wa-link').href = `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('on');
}

function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('on'));
  document.querySelectorAll('.sec').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('sec-' + tab).classList.add('on');
}

renderServices();
renderBarbers();
renderCalendar();
</script>

</body>
</html>
